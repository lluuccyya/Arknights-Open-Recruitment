<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃金娘 ❤ 可露希尔 · 公开招募终端</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --myrtle-green: #6db88a;
            --myrtle-gold: #d4a843;
            --myrtle-light: #b8d9c0;
            --courier-red: #8a2a3a;
            --courier-dark: #2a0a12;
            --courier-purple: #6a3050;
            --gold-light: #f0d68a;
            --bg-deep: #0a0610;
            --bg-card: #120a1a;
            --bg-card2: #1a1028;
            --border-color: #2a1a30;
            --text-primary: #e8e4d8;
            --text-secondary: #a898a8;
            --text-dim: #5a4a5a;
            --star-5: #f0a030;
            --star-4: #b8a0e0;
            --pink-glow: rgba(200, 80, 120, 0.15);
            --green-glow: rgba(109, 184, 138, 0.15);
        }

        body {
            background: var(--bg-deep);
            background-image: 
                radial-gradient(ellipse at 30% 20%, rgba(109, 184, 138, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(138, 42, 58, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(106, 48, 80, 0.05) 0%, transparent 50%);
            font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
        }

        /* 背景粒子 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 20%, rgba(255,200,220,0.3), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(200,255,220,0.2), transparent),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,200,200,0.25), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(200,200,255,0.15), transparent),
                radial-gradient(1px 1px at 90% 80%, rgba(255,220,200,0.2), transparent),
                radial-gradient(1.5px 1.5px at 15% 85%, rgba(200,255,200,0.1), transparent);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            padding: 16px 20px;
            margin: 0 auto;
        }

        /* ===== CP 主题顶部横幅 ===== */
        .cp-banner {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #0a0618 0%, #1a0820 30%, #120a1a 60%, #0a0610 100%);
            border: 1px solid rgba(200, 120, 160, 0.2);
            box-shadow: 0 0 40px rgba(200, 80, 120, 0.08), 0 0 80px rgba(109, 184, 138, 0.05);
        }

        .cp-banner-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            flex-wrap: wrap;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .cp-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, 
                rgba(109, 184, 138, 0.05) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(138, 42, 58, 0.05) 100%);
            z-index: 1;
        }

        .cp-banner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--myrtle-green), 
                var(--gold-light), 
                var(--courier-red), 
                transparent);
            opacity: 0.5;
            z-index: 1;
        }

        .cp-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cp-avatar-group {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .cp-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            position: relative;
        }

        .cp-avatar.myrtle {
            background: linear-gradient(135deg, #2a4a30, #4a8a5a);
            border: 2px solid var(--myrtle-green);
            box-shadow: 0 0 15px rgba(109, 184, 138, 0.3);
            z-index: 2;
            color: #b8d9c0;
        }

        .cp-avatar.courier {
            background: linear-gradient(135deg, #3a1020, #6a2038);
            border: 2px solid var(--courier-red);
            box-shadow: 0 0 15px rgba(138, 42, 58, 0.3);
            margin-left: -8px;
            z-index: 1;
            color: #d890a0;
        }

        .cp-heart {
            font-size: 18px;
            margin: 0 4px;
            animation: heartBeat 1.5s ease infinite;
            background: linear-gradient(135deg, #ff6b8a, #ff3b6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .cp-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .cp-title .myrtle-text {
            color: var(--myrtle-green);
        }

        .cp-title .heart-text {
            color: #ff4a7a;
            margin: 0 4px;
        }

        .cp-title .courier-text {
            color: #d06070;
        }

        .cp-title .sub {
            font-size: 11px;
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 3px;
            display: block;
        }

        .cp-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .cp-status .dot-group {
            display: flex;
            gap: 4px;
        }

        .cp-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-green { background: var(--myrtle-green); box-shadow: 0 0 8px rgba(109,184,138,0.5); }
        .dot-red { background: var(--courier-red); box-shadow: 0 0 8px rgba(138,42,58,0.5); }
        .dot-gold { background: var(--gold-light); box-shadow: 0 0 8px rgba(212,168,67,0.4); }

        /* ===== 主布局 ===== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 18px;
        }

        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
            .cp-banner-inner { justify-content: center; text-align: center; }
        }

        /* ===== 卡片 ===== */
        .card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-card2));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--myrtle-green), var(--gold-light), var(--courier-red));
            opacity: 0.3;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .accent-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color), transparent);
        }

        /* ===== 标签按钮 - CP色调 ===== */
        .tag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .tag-btn {
            padding: 5px 16px;
            border-radius: 4px;
            border: 1px solid #2a1a30;
            background: linear-gradient(145deg, #1a0a22, #12081a);
            color: #b0a0b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            letter-spacing: 0.5px;
        }

        .tag-btn:hover {
            border-color: #4a2a50;
            background: linear-gradient(145deg, #22102e, #1a0a26);
            color: #d0c0d8;
        }

        .tag-btn.active {
            background: linear-gradient(145deg, #1a2a1a, #121e12);
            border-color: var(--myrtle-green);
            color: var(--myrtle-light);
            box-shadow: 0 0 16px rgba(109, 184, 138, 0.12), inset 0 0 20px rgba(109, 184, 138, 0.04);
        }

        .tag-btn.active::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 4px;
            border: 1px solid rgba(109, 184, 138, 0.2);
            pointer-events: none;
        }

        /* ===== 输入 ===== */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .input-section input {
            flex: 1;
            min-width: 160px;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: rgba(10, 6, 20, 0.8);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .input-section input:focus {
            border-color: var(--courier-purple);
            box-shadow: 0 0 12px rgba(106, 48, 80, 0.15);
        }

        .input-section input::placeholder {
            color: var(--text-dim);
        }

        .btn {
            padding: 10px 22px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
        }

        .btn-cp {
            background: linear-gradient(135deg, var(--myrtle-green), #4a8a5a);
            color: #0a0610;
            box-shadow: 0 2px 16px rgba(109, 184, 138, 0.25);
        }
        .btn-cp:hover {
            background: linear-gradient(135deg, #7ac89a, #5a9a6a);
            box-shadow: 0 2px 24px rgba(109, 184, 138, 0.4);
            transform: translateY(-1px);
        }

        .btn-cp-outline {
            background: transparent;
            border: 1px solid var(--myrtle-green);
            color: var(--myrtle-light);
        }
        .btn-cp-outline:hover {
            background: rgba(109, 184, 138, 0.08);
            border-color: var(--gold-light);
        }

        .btn-danger {
            background: rgba(100, 30, 30, 0.4);
            border: 1px solid #4a2020;
            color: #d08080;
        }
        .btn-danger:hover {
            background: rgba(120, 40, 40, 0.5);
            border-color: #6a3030;
        }

        .btn-sm { padding: 6px 14px; font-size: 12px; }

        .action-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .synonym-tip {
            margin-top: 12px;
            padding: 10px 14px;
            background: linear-gradient(135deg, rgba(109, 184, 138, 0.05), rgba(138, 42, 58, 0.05));
            border: 1px solid rgba(200, 120, 160, 0.1);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .synonym-tip strong {
            color: var(--myrtle-light);
        }
        .synonym-tip .cp-highlight {
            color: #d08090;
        }

        /* ===== CP装饰分隔 ===== */
        .cp-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 2px;
        }
        .cp-divider::before,
        .cp-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--courier-purple), transparent);
        }

        /* ===== 结果区 ===== */
        .result-box { min-height: 320px; }

        .result-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: var(--text-dim);
            text-align: center;
        }

        .result-empty .cp-icon {
            font-size: 42px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .result-empty p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .result-empty .sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* 结果分组 */
        .result-group { margin-bottom: 20px; }

        .result-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(42, 26, 48, 0.6);
        }

        .result-group-header .star-label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .count-badge {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 500;
        }

        .count-badge.gold {
            background: rgba(212, 168, 67, 0.12);
            color: var(--gold-light);
            border: 1px solid rgba(212, 168, 67, 0.15);
        }
        .count-badge.purple {
            background: rgba(180, 140, 200, 0.12);
            color: var(--star-4);
            border: 1px solid rgba(180, 140, 200, 0.15);
        }

        /* 干员卡片 */
        .operator-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 14px;
            margin-bottom: 5px;
            background: rgba(18, 10, 30, 0.6);
            border: 1px solid rgba(42, 26, 48, 0.4);
            border-radius: 6px;
            transition: all 0.2s;
            gap: 8px;
            flex-wrap: wrap;
        }

        .operator-card:hover {
            border-color: rgba(200, 120, 160, 0.2);
            background: rgba(22, 12, 36, 0.8);
        }

        .operator-card .op-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .operator-card .op-avatar {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .avatar-5 {
            background: linear-gradient(135deg, #3a2a10, #2a1a08);
            border: 1px solid rgba(240, 160, 48, 0.3);
            color: var(--star-5);
        }
        .avatar-4 {
            background: linear-gradient(135deg, #1a1030, #100820);
            border: 1px solid rgba(180, 140, 200, 0.25);
            color: var(--star-4);
        }

        .operator-card .op-name { font-size: 14px; font-weight: 600; }
        .operator-card .op-tags { font-size: 12px; color: var(--text-secondary); }
        .operator-card .op-tags .highlight { color: var(--myrtle-light); }
        .operator-card .op-star { font-size: 13px; letter-spacing: 1px; white-space: nowrap; }

        .operator-card .op-match-tags {
            font-size: 11px;
            color: #7eb87c;
            background: rgba(80, 200, 120, 0.06);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(80, 200, 120, 0.12);
        }

        .no-match-box {
            text-align: center;
            padding: 36px 20px;
        }
        .no-match-box .big-warn {
            font-size: 48px;
            color: var(--courier-red);
            opacity: 0.5;
            display: block;
            margin-bottom: 10px;
        }
        .no-match-box .main-msg {
            font-size: 15px;
            color: #d08070;
            font-weight: 500;
        }
        .no-match-box .sub-msg {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .suggest-box {
            margin-top: 14px;
            padding: 12px 16px;
            background: rgba(109, 184, 138, 0.04);
            border: 1px solid rgba(109, 184, 138, 0.12);
            border-radius: 6px;
            font-size: 13px;
            color: var(--myrtle-light);
            line-height: 1.6;
        }

        /* 统计栏 */
        .result-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 12px;
            border-bottom: 1px solid rgba(42, 26, 48, 0.3);
            margin-bottom: 14px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 6px;
        }

        .result-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-dot-5 { width: 8px; height: 8px; border-radius: 50%; background: var(--star-5); }
        .stat-dot-4 { width: 8px; height: 8px; border-radius: 50%; background: var(--star-4); }

        .result-scroll {
            max-height: 540px;
            overflow-y: auto;
            padding-right: 4px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a2a40; }

        .operator-card { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== CP 主题展示区 ===== */
        .cp-showcase {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cp-showcase img {
            border-radius: 8px;
            max-width: 100%;
            height: auto;
            border: 1px solid rgba(200, 120, 160, 0.15);
            box-shadow: 0 0 20px rgba(200, 80, 120, 0.08);
        }

        .cp-showcase .mini-cp {
            max-height: 120px;
            border-radius: 8px;
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            color: var(--text-dim);
            font-size: 11px;
            border-top: 1px solid rgba(42, 26, 48, 0.3);
            margin-top: 20px;
            letter-spacing: 0.5px;
        }
        .footer .highlight-m { color: var(--myrtle-green); }
        .footer .highlight-c { color: var(--courier-red); }
        .footer .heart { color: #ff4a7a; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ===== CP 主题横幅 ===== -->
    <div class="cp-banner">
        <div class="cp-banner-inner">
            <div class="cp-logo">
                <div class="cp-avatar-group">
                    <div class="cp-avatar myrtle">桃</div>
                    <span class="cp-heart">❤</span>
                    <div class="cp-avatar courier">露</div>
                </div>
                <div class="cp-title">
                    <span class="myrtle-text">桃金娘</span>
                    <span class="heart-text">♡</span>
                    <span class="courier-text">可露希尔</span>
                    <span class="sub">✦ 罗德岛 · 公开招募终端 ✦</span>
                </div>
            </div>
            <div class="cp-status">
                <div class="dot-group">
                    <span class="dot dot-green"></span>
                    <span class="dot dot-gold"></span>
                    <span class="dot dot-red"></span>
                </div>
                <span>❤ CP Online · 数据同步中</span>
            </div>
        </div>
    </div>

    <!-- ===== 主网格 ===== -->
    <div class="main-grid">
        <!-- 左侧 -->
        <div class="left-panel">
            <div class="card" style="margin-bottom: 16px;">
                <div class="card-title">
                    📋 标签选择
                    <span class="accent-line"></span>
                </div>
                <div class="tag-grid" id="tagGrid"></div>
                <div class="action-bar">
                    <button class="btn btn-cp-outline btn-sm" onclick="clearAll()">清空</button>
                    <button class="btn btn-danger btn-sm" onclick="resetAll()">重置词条</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    ⌨ 手动输入
                    <span class="accent-line"></span>
                </div>
                <div class="input-section">
                    <input type="text" id="tagInput" placeholder="输入词条，如：先锋 回费 治疗">
                    <button class="btn btn-cp" onclick="computeFromInput()">计算</button>
                </div>
                <div class="synonym-tip">
                    <strong>💚 同义词支持</strong><br>
                    <span class="cp-highlight">回费</span> = 费用回复 &nbsp;·&nbsp; 
                    <span class="cp-highlight">快活</span> = 快速复活 &nbsp;·&nbsp; 
                    <span class="cp-highlight">AOE</span> = 群攻
                </div>
            </div>

            <!-- CP 小展示 -->
            <div class="card" style="margin-top: 16px; padding: 14px;">
                <div class="card-title" style="font-size:12px; margin-bottom: 10px;">
                    💕 今日罗德岛 CP 推荐
                    <span class="accent-line"></span>
                </div>
                <div style="text-align:center; font-size:12px; color:var(--text-secondary); line-height:1.8;">
                    <span style="color:var(--myrtle-green); font-weight:600;">桃金娘</span>
                    「博士，旗子举高高就能招到好干员哦！」
                    <br>
                    <span style="color:var(--courier-red); font-weight:600;">可露希尔</span>
                    「哼～让我看看这次能赚……啊不是，能招募到什么好苗子～」
                    <br><br>
                    <span style="font-size:11px; color:var(--text-dim);">
                        ❤ 一个负责可爱，一个负责赚钱 ❤
                    </span>
                </div>
            </div>
        </div>

    { name:'槐琥', star:5, tags:['特种','快速复活','近战','削弱'] },
    { name:'陨星', star:5, tags:['狙击','群攻','削弱','远程'] },
    { name:'慑砂', star:5, tags:['狙击','群攻','削弱','远程'] },
    { name:'安哲拉', star:5, tags:['狙击','减速','远程'] },
    { name:'白面鸮', star:5, tags:['医疗','治疗','支援','远程'] },
    { name:'华法琳', star:5, tags:['医疗','治疗','支援','远程'] },
    { name:'清流', star:5, tags:['医疗','治疗','支援'] },
    { name:'乌有', star:5, tags:['特种','输出','近战'] },
    { name:'子', star:5, tags:['特种','输出','快速复活'] },
    { name:'诗怀雅', star:5, tags:['近卫','支援','输出','近战'] },
    { name:'杜宾', star:5, tags:['近卫','支援','输出','近战'] },
    { name:'断崖', star:5, tags:['近卫','输出','群攻'] },
];

const SYNONYMS = {
    '回费':'费用回复', '费用回复':'费用回复',
    '快活':'快速复活', '快速复活':'快速复活',
    'aoe':'群攻', 'AOE':'群攻', 'AoE':'群攻', '群攻':'群攻',
    '近战':'近战', '远程':'远程',
    '治疗':'治疗', '支援':'支援', '控场':'控场',
    '爆发':'爆发', '减速':'减速', '生存':'生存',
    '输出':'输出', '削弱':'削弱', '防护':'防护',
    '位移':'位移', '召唤':'召唤',
    '先锋':'先锋', '近卫':'近卫', '重装':'重装',
    '狙击':'狙击', '术师':'术师', '辅助':'辅助',
    '医疗':'医疗', '特种':'特种',
};

const ALL_TAGS = [...new Set(OPERATORS.flatMap(op => op.tags))].sort();

function normalizeTags(inputTags) {
    return inputTags.map(t => {
        const trimmed = t.trim();
        if (!trimmed) return null;
        const lower = trimmed.toLowerCase();
        for (const [key, val] of Object.entries(SYNONYMS)) {
            if (key.toLowerCase() === lower) return val;
        }
        return trimmed;
    }).filter(t => t !== null);
}

function matchOperators(userInputTags) {
    const normalized = [...new Set(userInputTags)];
    if (normalized.length === 0) return [];
    const results = [];
    for (const op of OPERATORS) {
        const allMatch = normalized.every(t => op.tags.includes(t));
        if (allMatch) {
            const matchedCount = normalized.filter(t => op.tags.includes(t)).length;
            results.push({ ...op, matchedCount, matchRatio: matchedCount / op.tags.length });
        }
    }
    return results;
}

function computeAllCombinations(inputTags) {
    const normalized = [...new Set(normalizeTags(inputTags))];
    if (normalized.length === 0) return [];
    const subsets = [];
    const n = normalized.length;
    for (let mask = 1; mask < (1 << n); mask++) {
        const subset = [];
        for (let i = 0; i < n; i++) {
            if (mask & (1 << i)) subset.push(normalized[i]);
        }
        subsets.push(subset);
    }
    subsets.sort((a, b) => b.length - a.length);
    const allResults = [];
    const seen = new Set();
    for (const subset of subsets) {
        const matched = matchOperators(subset);
        for (const m of matched) {
            const key = m.name + '|' + [...subset].sort().join(',');
            if (!seen.has(key)) {
                seen.add(key);
                allResults.push({ ...m, matchedTags: subset });
            }
        }
    }
    allResults.sort((a, b) => {
        if (b.star !== a.star) return b.star - a.star;
        if (b.matchedTags.length !== a.matchedTags.length) return b.matchedTags.length - a.matchedTags.length;
        return b.matchRatio - a.matchRatio;
    });
    return allResults;
}

let selectedTags = new Set();

function renderTagGrid() {
    const grid = document.getElementById('tagGrid');
    grid.innerHTML = '';
    for (const tag of ALL_TAGS) {
        const btn = document.createElement('span');
        btn.className = 'tag-btn' + (selectedTags.has(tag) ? ' active' : '');
        btn.textContent = tag;
        btn.onclick = () => {
            if (selectedTags.has(tag)) selectedTags.delete(tag);
            else selectedTags.add(tag);
            renderTagGrid();
            computeFromTags();
        };
        grid.appendChild(btn);
    }
}

function computeFromTags() {
    const tags = [...selectedTags];
    if (tags.length === 0) {
        showEmpty('👆 请选择或输入公开招募词条', '等待指令输入，博士～');
        return;
    }
    computeAndRender(tags);
}

function computeFromInput() {
    const input = document.getElementById('tagInput').value.trim();
    if (!input) {
        if (selectedTags.size > 0) { computeFromTags(); return; }
        showEmpty('✏️ 请输入词条', '例如：先锋 回费 治疗');
        return;
    }
    const raw = input.split(/[\s,，、]+/).filter(t => t.trim());
    computeAndRender(raw);
}

function computeAndRender(rawTags) {
    const normalized = normalizeTags(rawTags);
    if (normalized.length === 0) {
        showEmpty('⚠️ 未识别到有效词条', '请检查输入是否正确');
        return;
    }
    const results = computeAllCombinations(normalized);
    if (results.length === 0) {
        document.getElementById('resultBox').innerHTML = `
            <div class="no-match-box">
                <span class="big-warn">😿</span>
                <div class="main-msg">当前词条无法锁定四星或五星</div>
                <div class="sub-msg">建议重置词条，刷新招募标签</div>
                <div class="suggest-box">
                    💡 公开招募需要至少2个匹配标签才能稳定锁定高星干员。<br>
                    尝试「先锋 + 费用回复 + 治疗」→ 桃金娘（四星）
                </div>
            </div>
        `;
        return;
    }
    const star5 = results.filter(r => r.star === 5);
    const star4 = results.filter(r => r.star === 4);
    function uniqueOps(arr) {
        const map = new Map();
        for (const item of arr) {
            const key = item.name;
            if (!map.has(key) || item.matchedTags.length > map.get(key).matchedTags.length)
                map.set(key, item);
        }
        return [...map.values()];
    }
    const unique5 = uniqueOps(star5);
    const unique4 = uniqueOps(star4);
    let html = '';
    html += `<div class="result-stats">`;
    html += `<span class="stat-item"><span class="stat-dot-5"></span> 五星 ${unique5.length}</span>`;
    html += `<span class="stat-item"><span class="stat-dot-4"></span> 四星 ${unique4.length}</span>`;
    html += `<span style="color:var(--text-dim);">共 ${unique5.length + unique4.length} 名干员</span>`;
    html += `</div>`;
    html += `<div class="result-scroll">`;
    if (unique5.length > 0) {
        html += `<div class="result-group">`;
        html += `<div class="result-group-header">`;
        html += `<span class="star-label" style="color:var(--star-5);">⭐⭐⭐⭐⭐ 五星</span>`;
        html += `<span class="count-badge gold">${unique5.length} 名</span>`;
        html += `</div>`;
        for (const op of unique5) html += renderOpCard(op, true);
        html += `</div>`;
    }
    if (unique4.length > 0) {
        html += `<div class="result-group">`;
        html += `<div class="result-group-header">`;
        html += `<span class="star-label" style="color:var(--star-4);">⭐⭐⭐⭐ 四星</span>`;
        html += `<span class="count-badge purple">${unique4.length} 名</span>`;
        html += `</div>`;
        for (const op of unique4) html += renderOpCard(op, false);
        html += `</div>`;
    }
    html += `</div>`;
    document.getElementById('resultBox').innerHTML = html;
}

function renderOpCard(op, is5) {
    const starStr = is5 ? '⭐⭐⭐⭐⭐' : '⭐⭐⭐⭐';
    const avatarClass = is5 ? 'avatar-5' : 'avatar-4';
    const tagStr = op.matchedTags ? op.matchedTags.join(' + ') : '';
    return `
        <div class="operator-card">
            <div class="op-info">
                <div class="op-avatar ${avatarClass}">${op.name[0]}</div>
                <div>
                    <div class="op-name">${op.name}</div>
                    <div class="op-tags">
                        ${op.tags.map(t => 
                            op.matchedTags && op.matchedTags.includes(t) 
                                ? `<span class="highlight">${t}</span>` 
                                : t
                        ).join(' · ')}
                    </div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                ${tagStr ? `<span class="op-match-tags">✅ ${tagStr}</span>` : ''}
                <span class="op-star" style="color:${is5 ? 'var(--star-5)' : 'var(--star-4)'}">${starStr}</span>
            </div>
        </div>
    `;
}

function showEmpty(mainMsg, subMsg) {
    document.getElementById('resultBox').innerHTML = `
        <div class="result-empty">
            <div class="cp-icon">💕</div>
            <p>${mainMsg || '等待指令输入，博士～'}</p>
            ${subMsg ? `<div class="sub">${subMsg}</div>` : ''}
        </div>

}

function clearAll() {
    selectedTags.clear();
    document.getElementById('tagInput').value = '';
    renderTagGrid();
    showEmpty('👆 请选择或输入公开招募词条', '等待指令输入，博士～');
}

function resetAll() { clearAll(); }

renderTagGrid();
showEmpty('👆 请选择或输入公开招募词条', '等待指令输入，博士～');

document.getElementById('tagInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') computeFromInput();
